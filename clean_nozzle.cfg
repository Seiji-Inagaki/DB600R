[gcode_macro CLEAN_NOZZLE]
#variable_start_x: 305
#variable_start_y: 349
#variable_start_z: 0.0
#variable_wipe_dist: -40
#variable_wipe_qty: 10
#variable_wipe_spd: 200
#variable_raise_distance: 30
variable_start_x: 17
variable_start_y: -3
variable_start_z: -3
variable_wipe_dist_y: -3
variable_wipe_qty: 5
variable_wipe_spd: 50
variable_raise_distance: 18

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
 G1 Y0 F3000
 SET_HEATER_TEMPERATURE HEATER=extruder TARGET=220
 M109 S220 ; set temperature and wait for it to be reached

 M83
 G1 E-5 F300
 
 G90                                            ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Wipe nozzle
 #{% for wipes in range(1, (wipe_qty + 1)) %}
 #  G1 X{start_x + wipe_dist} F{wipe_spd * 60}
 #  G1 X{start_x} F{wipe_spd * 60}
 #{% endfor %}

  {% for wipes in range(1, (wipe_qty + 1)) %}
   #WIPE LEFT
   G1 X{start_x + 15} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + 15} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + 15} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + 15} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + 15} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   #WIPE RIGHT
   G1 X{start_x - 15} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - 15} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - 15} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - 15} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - 15} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   
 {% endfor %}
 G1 X100

 ## Raise nozzle
 G1 Z{raise_distance}