# Leviathan V1.3 - Custom Cartesian Printer
# Stepper assignment (Leviathan connectors):
#   X          -> STEPPER0
#   Y          -> STEPPER1
#   Z0         -> HV STEPPER0 (TMC5160)  [temporarily moved from STEPPER2 on 2026-07-17]
#   Z1         -> HV STEPPER1 (TMC5160)  [temporarily moved from STEPPER3 on 2026-07-17]
#   Extruder   -> STEPPER4
#   NOTE (2026-07-17): Z0/Z1 moved to the HV Vin (TMC5160) rail as a temporary
#     workaround while waiting on bulk capacitors for Main Vin. This isolates
#     Z-axis inrush current at G28 from the Main Vin rail that also powers the
#     MCU, which was suspected to cause "Lost communication with MCU" shutdowns.
#     HV Vin is fed from the former Pi 24V->5V buck-converter line (buck
#     removed, AWG14, fused separately). Pi itself runs on an independent
#     supply. See DB600R_Leviathan移行_引き継ぎメモ.md for full background.
#     Original STEPPER2/STEPPER3 pin values are kept in comments below for
#     easy revert once capacitors are installed and tested.
#   Endstops: X-ENDSTOP, Y-ENDSTOP (Z uses probe virtual endstop, no physical Z endstop wired)
#   Probe:     Z-PROBE connector
#   Heater:    HEATER (extruder), HEATBED (bed)
#   Thermistors: TH0 (extruder), TH1 (bed)
#   Fans: FAN0 (print cooling), FAN1 (hotend fan), FAN2 (controller fan)
#   Filament sensor: dedicated filament sensor port

[include mainsail.cfg]
[include client.cfg]
[include clean_nozzle.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_2A001B000551323439333335-if00
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[force_move]
enable_force_move: True
#####################################################################
#   Probe
#####################################################################

[probe]
pin: ^PF1
x_offset: 0
y_offset: 0
speed: 3
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

[safe_z_home]
home_xy_position: 300,300
speed: 80
z_hop: 5
z_hop_speed: 5

[endstop_phase]

[bed_mesh]
speed: 180
horizontal_move_z: 5
mesh_min: 100, 100
mesh_max: 500, 500
probe_count: 3,3
fade_start: 0.6
fade_end: 3.0

#####################################################################
#   X/Y Steppers
#####################################################################

## X -> STEPPER0
[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
microsteps: 16
rotation_distance: 60
endstop_pin: ^!PC1
position_endstop: 0
position_min: 0
position_max: 600
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.6
hold_current: 0.500
stealthchop_threshold: 999999

## Y -> STEPPER1
[stepper_y]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
microsteps: 16
rotation_distance: 60
endstop_pin: ^!PC2
position_endstop: -20
position_min: -20
position_max: 615
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 1.0
hold_current: 0.500
stealthchop_threshold: 999999

#####################################################################
#   Z Stepper (dual motor, independent drivers)
#   TEMPORARY: running on HV Vin / TMC5160 channels, see header note.
#####################################################################

## Z0 -> HV STEPPER0 (TMC5160)
## Was: STEPPER2 -> step_pin PC9 / dir_pin PC8 / enable_pin !PC10 / uart_pin PA8
[stepper_z]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
microsteps: 64
rotation_distance: 2
endstop_pin: probe:z_virtual_endstop
position_max: 525
position_min: -5

[tmc5160 stepper_z]
cs_pin: PE15
spi_bus: spi4
sense_resistor: 0.075
run_current: 0.6
hold_current: 0.2500
stealthchop_threshold: 0

## Z1 -> HV STEPPER1 (TMC5160)
## Was: STEPPER3 -> step_pin PG7 / dir_pin PG6 / enable_pin !PC7 / uart_pin PG8
[stepper_z1]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
microsteps: 64
rotation_distance: 2

[tmc5160 stepper_z1]
cs_pin: PE11
spi_bus: spi4
sense_resistor: 0.075
run_current: 0.6
hold_current: 0.2500
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

## Extruder -> STEPPER4
[extruder]
step_pin: PD10
dir_pin: PD9
enable_pin: !PD13
microsteps: 16
rotation_distance: 47.088
gear_ratio: 9:1
nozzle_diameter: 0.6
filament_diameter: 1.750
heater_pin: PG10
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
min_temp: 0
max_temp: 280
max_power: 1.0

[tmc2209 extruder]
uart_pin: PD11
run_current: 0.6

[idle_timeout]
timeout: 6000

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PG11
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA2
control: pid
pid_Kp: 154.027
pid_Ki: 6.770
pid_Kd: 148.182
max_power: 1.0
min_temp: 0
max_temp: 130
pwm_cycle_time: 0.02

[verify_heater extruder]
max_error: 120

[verify_heater heater_bed]
max_error: 240
check_gain_time: 120
hysteresis: 35
heating_gain: 0.5

#####################################################################
#   Fans
#####################################################################

[heater_fan hotend_fan]
pin: PB3
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 70.0

[fan]
pin: PB7

[controller_fan Stepper_Fan_0~5]
pin: PF7

[controller_fan HV_Stepper_Fan]
pin: PF9

#####################################################################
#   Filament Sensor
#####################################################################

[filament_switch_sensor runout_sensor]
pause_on_runout: True
runout_gcode: PAUSE
event_delay: 3.0
pause_delay: 0.5
switch_pin: !PC0

#####################################################################
#   Macros
#####################################################################

[gcode_macro PRINT_DONE]
gcode:
  CLEAN_NOZZLE

