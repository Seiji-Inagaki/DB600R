# Leviathan V1.3 - Custom Cartesian Printer
# Stepper assignment (Leviathan connectors):
#   X          -> HV STEPPER0 (TMC5160)
#   Y          -> HV STEPPER1 (TMC5160)
#   Z0         -> STEPPER2 (TMC2209)
#   Z1         -> STEPPER3 (TMC2209)
#   Extruder   -> STEPPER4 (TMC2209)
#   Endstops: X-ENDSTOP, Y-ENDSTOP (Z uses probe virtual endstop, no physical Z endstop wired)
#   Probe:     Z-PROBE connector
#   Heater:    HEATER (extruder), HEATBED (bed)
#   Thermistors: TH0 (extruder), TH1 (bed)
#   Fans: FAN0 (print cooling), FAN1 (hotend fan), FAN2 (controller fan)
#   Filament sensor: dedicated filament sensor port
#   経緯・変更理由は引き継ぎメモ参照(DB600R_Leviathan移行_引き継ぎメモ.md)

[include mainsail.cfg]
[include client.cfg]
[include clean_nozzle.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_2A001B000551323439333335-if00
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[force_move]
enable_force_move: True
#####################################################################
#   Probe
#####################################################################

[probe]
pin: ^PF1
x_offset: 0
y_offset: 0
speed: 3
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

[safe_z_home]
home_xy_position: 300,300
speed: 80
z_hop: 5
z_hop_speed: 5

[endstop_phase]

[bed_mesh]
speed: 180
horizontal_move_z: 5
mesh_min: 100, 100
mesh_max: 500, 500
probe_count: 3,3
fade_start: 0.6
fade_end: 3.0

#####################################################################
#   X/Y Steppers -- now on HV Vin / TMC5160 (see header note)
#####################################################################

## X -> HV STEPPER0
## Was: STEPPER0 (TMC2209) -> uart_pin PD5
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
microsteps: 16
rotation_distance: 60
endstop_pin: ^!PC1
position_endstop: 0
position_min: 0
position_max: 600
homing_speed: 50

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
sense_resistor: 0.075
run_current: 0.8
hold_current: 0.500
stealthchop_threshold: 999999

## Y -> HV STEPPER1
## Was: STEPPER1 (TMC2209) -> uart_pin PD0
[stepper_y]
step_pin: PF15
dir_pin: PF14
enable_pin: !PE9
microsteps: 16
rotation_distance: 60
endstop_pin: ^!PC2
position_endstop: -20
position_min: -20
position_max: 615
homing_speed: 50

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
sense_resistor: 0.075
run_current: 1.0
hold_current: 0.500
stealthchop_threshold: 999999

#####################################################################
#   Z Stepper (dual motor, independent drivers) -- back on Main Vin / TMC2209
#####################################################################

## Z0 -> STEPPER2
## Was (temporarily): HV STEPPER0 (TMC5160)
[stepper_z]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
microsteps: 64
rotation_distance: 2
endstop_pin: probe:z_virtual_endstop
position_max: 525
position_min: -5

[tmc2209 stepper_z]
uart_pin: PA8
run_current: 0.6
hold_current: 0.2500
stealthchop_threshold: 0

## Z1 -> STEPPER3
## Was (temporarily): HV STEPPER1 (TMC5160)
[stepper_z1]
step_pin: PG7
dir_pin: !PG6
enable_pin: !PC7
microsteps: 64
rotation_distance: 2

[tmc2209 stepper_z1]
uart_pin: PG8
run_current: 0.6
hold_current: 0.2500
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

## Extruder -> STEPPER4
[extruder]
step_pin: PD10
dir_pin: PD9
enable_pin: !PD13
microsteps: 16
rotation_distance: 47.088
gear_ratio: 9:1
nozzle_diameter: 0.6
filament_diameter: 1.750
heater_pin: PG10
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
min_temp: 0
max_temp: 280
max_power: 1.0
pullup_resistor: 2200

[tmc2209 extruder]
uart_pin: PD11
run_current: 0.6

[idle_timeout]
timeout: 6000

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PG11
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA2
control: pid
pid_Kp: 154.027
pid_Ki: 6.770
pid_Kd: 148.182
max_power: 1.0
min_temp: 0
max_temp: 130
pwm_cycle_time: 0.02
pullup_resistor: 2200

[verify_heater extruder]
max_error: 120

[verify_heater heater_bed]
max_error: 240
check_gain_time: 120
hysteresis: 35
heating_gain: 0.5

#####################################################################
#   Fans
#####################################################################

[heater_fan hotend_fan]
pin: PB3
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 70.0

[fan]
pin: PB7

[controller_fan Stepper_Fan_0~5]
pin: PF7

[controller_fan HV_Stepper_Fan]
pin: PF9

#####################################################################
#   Filament Sensor
#####################################################################

[filament_switch_sensor runout_sensor]
pause_on_runout: True
runout_gcode: PAUSE
event_delay: 3.0
pause_delay: 0.5
switch_pin: !PC0

#####################################################################
#   Macros
#####################################################################

[gcode_macro PRINT_DONE]
gcode:
  CLEAN_NOZZLE

